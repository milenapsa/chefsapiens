name: ChefSapiens RC3

on:
  push:
    paths:
      - "api/**"
      - "Dockerfile.rc3-hml"
      - "docker-compose.rc3-hml.yml"
      - "release/rc3-parts/**"
      - ".github/workflows/rc3.yml"
  workflow_dispatch:

jobs:
  rc3-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9010cd537c4c0793e458acd8b1099b1914b2e9cd # v4

      - name: Reconstruct canonical RC3
        run: |
          set -euo pipefail
          mkdir -p /tmp/rc3-parts /tmp/rc3
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            cp "release/rc3-parts/$file" "/tmp/rc3-parts/$file"
          done < release/rc3-parts/ORDER
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            cat "/tmp/rc3-parts/$file"
          done < release/rc3-parts/ORDER > /tmp/chefsapiens-1.1.0-rc3-source.zip
          echo "6232c3bd8d2433f0ca9dad7af08ccaa9e4e559e6b525f9f338ebbd66ce50738b  /tmp/chefsapiens-1.1.0-rc3-source.zip" | sha256sum -c -
          unzip -tq /tmp/chefsapiens-1.1.0-rc3-source.zip
          unzip -q /tmp/chefsapiens-1.1.0-rc3-source.zip -d /tmp/rc3
          cp api/lib/engine.mjs /tmp/rc3/chefsapiens-1.1.0-rc3/api/lib/engine.mjs

      - name: Functional and security gates
        working-directory: /tmp/rc3/chefsapiens-1.1.0-rc3
        run: |
          node scripts/check.mjs
          node scripts/openapi-check.mjs
          node scripts/secret-scan.mjs
          node --test tests/api-engine.test.mjs tests/api-http.test.mjs

      - name: Build homologation image
        run: docker build -f Dockerfile.rc3-hml -t chefsapiens:1.1.0-rc.3-hml .
