name: Materializar ChefSapiens 1.1 RC2

on:
  push:
    branches: [main]
    paths:
      - "release/rc2-parts/**"
      - ".github/workflows/materialize-rc2.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ !contains(github.event.head_commit.message || '', 'materialize: ChefSapiens 1.1 RC2') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruir arquivo-fonte
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/rc2
          cat release/rc2-parts/part-*.b64 | base64 -d > .tmp/rc2/source.zip
          echo "3b1e1cc52817010a7f689d67c665532165be1f7c3a7c1deab2c760f4ea271554  .tmp/rc2/source.zip" | sha256sum -c -
          unzip -q .tmp/rc2/source.zip -d .tmp/rc2/extracted
          test -f .tmp/rc2/extracted/chefsapiens-1.1.0-rc2/package.json
          test -f .tmp/rc2/extracted/chefsapiens-1.1.0-rc2/manifest.json

      - name: Materializar árvore no repositório
        shell: bash
        run: |
          set -euo pipefail
          cp -a .tmp/rc2/extracted/chefsapiens-1.1.0-rc2/. .
          rm -rf .tmp
          npm test
          npm run verify
          npm run integrity

      - name: Registrar árvore materializada
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ChefSapiens Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Árvore já estava materializada."
            exit 0
          fi
          git commit -m "materialize: ChefSapiens 1.1 RC2"
          git push origin HEAD:main
