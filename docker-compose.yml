services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chefsapiens-prod:1.0
    container_name: chefsapiens-prod-app
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    tmpfs:
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ && wget -q -O /dev/null http://127.0.0.1/manifest.webmanifest"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
