services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.hml
    image: chefsapiens:1.1.0-rc.2-hml
    container_name: chefsapiens-rc2-hml-app
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    tmpfs:
      - /tmp
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      REQUIRE_API_KEY: "false"
      RATE_LIMIT_PER_MINUTE: "120"
      MAX_BODY_BYTES: "1000000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  configure:
    image: docker:27-cli
    container_name: chefsapiens-rc2-hml-configure
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    environment:
      APP_CONTAINER: chefsapiens-rc2-hml-app
      CADDY_CONTAINER: media-studio-caddy
      HML_HOSTNAME: culinaria-hml.homosapiens.id
      APP_PORT: "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_hml_rc2_backups:/backups
      - ./ops/configure-caddy-rc2.sh:/configure-caddy.sh:ro
    command: ["/bin/sh", "-c", "/bin/sh /configure-caddy.sh && touch /tmp/configured && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/configured"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  smoke:
    image: curlimages/curl:8.11.1
    container_name: chefsapiens-rc2-hml-smoke
    depends_on:
      configure:
        condition: service_healthy
    restart: "no"
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        curl -fsS --retry 12 --retry-delay 2 https://culinaria-hml.homosapiens.id/readyz | grep -q '"ok":true'
        curl -fsS https://culinaria-hml.homosapiens.id/openapi.json | grep -q '"1.1.0-rc.2"'
        curl -fsS https://culinaria-hml.homosapiens.id/ | grep -q 'ChefSapiens'
        echo HML_PUBLIC_SMOKE_OK

volumes:
  caddy_hml_rc2_backups:
